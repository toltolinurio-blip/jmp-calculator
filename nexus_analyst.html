        const DEFAULT_REBALANCE_PROMPT = `2026년 최신 실적/모멘텀 반영. Nexus Analyst v4.9 Titanium 리밸런싱 프로토콜.\n목적: 포트폴리오 비중 조절.\n대상: {name}\n보유정보: 증권사 {brokerage}, 매입가 {purchasePrice}, 현재가 {price}, 보유수량 {quantity}\n\n[필수 JSON 포맷 - 모든 필드 채울 것. 모르면 "확인필요" 명시]\n\`\`\`json\n{\n  "name": "{simpleName}",\n  "ticker": "종목 티커. KR 6자리 숫자(예: 005930), US 영문(예: AAPL). 모르면 빈 문자열",\n  "country": "KR/US",\n  "brokerage": "{brokerage}",\n  "currentPrice": "숫자(현재가)",\n  "purchasePrice": "숫자(매입가 입력값 유지)",\n  "quantity": "숫자(수량 입력값 유지)",\n  "strategy": "리밸런싱 전략 (예: 비중 축소, 교체 매매)",\n  "entryPrice": "추매/물타기 적정가",\n  "targetPrice": "목표가",\n  "stopLoss": "손절가",\n  "action": "구체적 대응 지침",\n  "groupCode": "buyAccum/hold/sellProfit/sellStop 중 택1",\n  "probability": "상승확률(숫자만)",\n  "yieldGap": "수치(%p)",\n  "moatTier": "1/2/3 중 택1",\n  "bodyLocation": "sole/knee/waist/chest/shoulder/head/injured 중 택1",\n  "bodyLocationNote": "한 줄 정량 비유",\n  "entityAuditDate": "YYYY-MM-DD",\n  "entityAuditResult": "한 줄 (변동 없음 가능)",\n  "opm": "수치(%)",\n  "roe3y": "수치(%)",\n  "beta": "수치",\n  "analysisDate": "YYYY-MM-DD",\n  "protocolVersion": "v4.9"\n}\n\`\`\``;

        // --- Helper Functions (Defined FIRST) ---
        const fmt = (n) => n ? Number(n).toLocaleString() : '0';

        const fmtDate = (ts) => {
            if (!ts) return '';
            const d = new Date(typeof ts === 'number' ? ts : Number(ts));
            if (isNaN(d.getTime())) return '';
            const mo = String(d.getMonth()+1).padStart(2,'0');
            const dd = String(d.getDate()).padStart(2,'0');
            const hh = String(d.getHours()).padStart(2,'0');
            const mm = String(d.getMinutes()).padStart(2,'0');
            return `${mo}/${dd} ${hh}:${mm}`;
        };

        // ============================================================
        // File System Access API: 자동저장 파일 핸들 영구 저장 (v25.60)
        // OneDrive/Dropbox 폴더 안의 파일을 가리키는 핸들을 IndexedDB에
        // 보관하고, stocks/history 변경 시 그 파일에 자동 쓰기.
        // ============================================================
        const FS_DB_NAME = 'nexus_filesys';
        const FS_STORE   = 'handles';

        const fsOpenDB = () => new Promise((resolve, reject) => {
            const req = indexedDB.open(FS_DB_NAME, 1);
            req.onupgradeneeded = e => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(FS_STORE)) db.createObjectStore(FS_STORE);
            };
            req.onsuccess = e => resolve(e.target.result);
            req.onerror   = e => reject(e.target.error);
        });

        const fsSaveHandle = async (userId, handle) => {
            const db = await fsOpenDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(FS_STORE, 'readwrite');
                tx.objectStore(FS_STORE).put(handle, `handle_${userId}`);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        };

        const fsLoadHandle = async (userId) => {
            try {
                const db = await fsOpenDB();
                return await new Promise((resolve, reject) => {
                    const tx = db.transaction(FS_STORE, 'readonly');
                    const req = tx.objectStore(FS_STORE).get(`handle_${userId}`);
                    req.onsuccess = () => resolve(req.result || null);
                    req.onerror = () => reject(req.error);
                });
            } catch (e) { return null; }
        };

        const fsRemoveHandle = async (userId) => {
            try {
                const db = await fsOpenDB();
                return await new Promise((resolve, reject) => {
                    const tx = db.transaction(FS_STORE, 'readwrite');
                    tx.objectStore(FS_STORE).delete(`handle_${userId}`);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);

        // --- Icons ---
        const Icon = ({ p, s=16, c="currentColor" }) => (

        // --- Components ---
        const PriceMeter = ({ c, l, h, sl, className="mt-2" }) => {
            const cur  = parseFloat(String(c  || '').replace(/,/g,'')) || 0;
            const low  = parseFloat(String(l  || '').replace(/[^0-9.]/g, '')) || 0;
            const high = parseFloat(String(h  || '').replace(/[^0-9.]/g, '')) || 0;
            const stop = parseFloat(String(sl || '').replace(/[^0-9.]/g, '')) || 0;

            if (!low || !high) return null;

            // 전체 범위: 손절가(있으면) ~ 목표가의 10% 여유
            const rangeMin = stop > 0 ? stop * 0.97 : low * 0.92;
            const rangeMax = high * 1.08;
            const range = rangeMax - rangeMin;
            if (range <= 0) return null;

            const toX = (v) => Math.max(0, Math.min(100, ((v - rangeMin) / range) * 100));

            const stopX  = stop > 0 ? toX(stop)  : null;
            const entryX = toX(low);
            const highX  = toX(high);
            const curX   = toX(cur);

            // 현재가 위치 판단
            const isAboveTarget = cur >= high;
            const isBelowStop   = stop > 0 && cur <= stop;
            const isInEntry     = cur >= low && cur < high;
            const curColor = isAboveTarget ? '#059669' : isBelowStop ? '#dc2626' : '#7c3aed';

            return (
                <div className={`${className} select-none`}>

                                style={{left:`${stopX}%`, width:`${Math.max(0, entryX - stopX)}%`, background:'linear-gradient(90deg,#fca5a5,#fcd34d)'}}/>

                        {/* 매수존 ~ 목표가: 수익 구간 (초록) */}

        // --- Search Highlight Helper ---
        const HighlightText = ({ text, term }) => {
            if (!term || !text) return <span>{text}</span>;
            const idx = text.toLowerCase().indexOf(term.toLowerCase());
            if (idx === -1) return <span>{text}</span>;
            return (
                <span>
                    {text.slice(0, idx)}
                    <mark style={{background:'#ddd6fe', color:'#5b21b6', borderRadius:'2px', padding:'0 1px'}}>{text.slice(idx, idx + term.length)}</mark>

        const StockCard = ({ s, onExpand, onPriceClick, isCompact, searchTerm, sortMode, usdRate }) => {

            // ===== 환율 (USD→KRW) =====

            const fsWriteTimerRef = useRef(null);

                        // localStorage 용량 산정 (UTF-16: 1자≈2바이트, 5MB 한도)
                        const usedMB = ((stocksStr.length + historyStr.length) * 2) / (1024 * 1024);
                        const isWarn = usedMB >= 4.0;
                        const msg = isWarn
                            ? `⚠️ 저장공간 ${usedMB.toFixed(2)}MB / 5MB · 백업 후 정리 권장`
                            : '데이터가 안전하게 저장되었습니다.';

                        setToast({ show: true, msg });
                        const timer = setTimeout(() => setToast(s => ({ ...s, show: false })), isWarn ? 5000 : 2000);
                        return () => clearTimeout(timer);
                    } else {
                        isMounted.current = true;

                }
            }, [stocks, history, user]);

            useEffect(() => {

                try {
                    const sLen = (localStorage.getItem(`nexus_${user.id}_stocks`) || '').length;
                    const hLen = (localStorage.getItem(`nexus_${user.id}_history`) || '').length;
                    const usedMB = ((sLen + hLen) * 2) / (1024 * 1024);
                    if (usedMB >= 4.0) {
                        setTimeout(() => {
                            setToast({
                                show: true,
                                msg: `⚠️ 저장공간 ${usedMB.toFixed(2)}MB / 5MB · 백업 권장 (설정→내보내기)`
                            });
                            setTimeout(() => setToast(s => ({ ...s, show: false })), 5500);
                        }, 1500);
                    }
                } catch (e) { /* silent */ }
            // eslint-disable-next-line react-hooks/exhaustive-deps
            }, [user?.id]);

            // Save Prompts
            useEffect(() => {
                localStorage.setItem('nexus_prompt_std', stdPrompt);
                localStorage.setItem('nexus_prompt_reb', rebPrompt);
            }, [stdPrompt, rebPrompt]);

            // Force Save on Unload
            useEffect(() => {
                const handleUnload = () => {
                    if(user && user.id) {
                        localStorage.setItem(`nexus_${user.id}_stocks`, JSON.stringify(stocks));
                        localStorage.setItem(`nexus_${user.id}_history`, JSON.stringify(history));
                    }
                };
                window.addEventListener('beforeunload', handleUnload);
                return () => window.removeEventListener('beforeunload', handleUnload);
            }, [stocks, history, user]);

            // ============================================================
            // 자동저장: 부팅 시 IndexedDB에서 파일 핸들 복원 시도
            // ============================================================
            useEffect(() => {
                if (!user?.id || !FS_API_AVAILABLE) return;
                (async () => {
                    const handle = await fsLoadHandle(user.id);
                    if (!handle) return;
                    const perm = await fsQueryPerm(handle, 'readwrite');
                    if (perm === 'granted') {
                        // 권한 살아있음 → 즉시 연결
                        setFileHandle(handle);
                        setFsState({
                            status: 'connected',
                            fileName: handle.name || 'portfolio.json',
                            lastSync: null,
                            error: ''
                        });
                    } else {
                        // 'prompt' 또는 'denied' - 사용자 클릭 후 재허가 필요
                        setFsState({
                            status: 'permission_needed',
                            fileName: handle.name || 'portfolio.json',
                            lastSync: null,
                            error: ''
                        });
                    }
                })();
            // eslint-disable-next-line react-hooks/exhaustive-deps
            }, [user?.id]);

            // ============================================================
            // 자동저장: stocks/history 변경 → 800ms 디바운스 후 파일 쓰기
            // ============================================================
            useEffect(() => {
                if (!fileHandle || !isMounted.current) return;
                if (fsWriteTimerRef.current) clearTimeout(fsWriteTimerRef.current);
                if (fsSyncIndicatorTimerRef.current) clearTimeout(fsSyncIndicatorTimerRef.current);

                // 즉시 'syncing' 표시
                setFsState(s => ({ ...s, status: 'syncing' }));

                fsWriteTimerRef.current = setTimeout(async () => {
                    const result = await fsWriteFile(fileHandle, {
                        stocks,
                        history,
                        savedAt: Date.now(),
                        appVersion: APP_VERSION,
                        userName: user?.name || ''
                    });
                    if (result.ok) {
                        setFsState(s => ({
                            ...s,
                            status: 'connected',
                            lastSync: Date.now(),
                            error: ''
                        }));
                    } else if (result.reason === 'NotAllowedError' || result.reason === 'SecurityError') {
                        setFsState(s => ({
                            ...s,
                            status: 'permission_needed',
                            error: '권한 만료 - 재허가 필요'
                        }));
                    } else {
                        setFsState(s => ({
                            ...s,
                            status: 'error',
                            error: result.message || '파일 쓰기 실패'
                        }));
                    }
                }, 800);

                return () => {
                    if (fsWriteTimerRef.current) clearTimeout(fsWriteTimerRef.current);
                };
            // eslint-disable-next-line react-hooks/exhaustive-deps
            }, [stocks, history, fileHandle]);

            // 자동저장 파일 신규 연결 (또는 변경)
            const connectAutoSaveFile = async () => {
                if (!FS_API_AVAILABLE) {
                    alert('이 브라우저는 자동 파일 저장을 지원하지 않습니다.\n\nChrome 86+ 또는 Edge 86+ 데스크탑 버전에서 사용하세요.');
                    return;
                }
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: `nexus_portfolio_${(user?.name || 'user').replace(/[^a-zA-Z0-9가-힣_-]/g, '')}.json`,
                        types: [{
                            description: 'Nexus Portfolio Backup',
                            accept: { 'application/json': ['.json'] }
                        }]
                    });
                    // 즉시 1회 쓰기로 초기 데이터 저장
                    setFsState(s => ({ ...s, status: 'syncing' }));
                    const result = await fsWriteFile(handle, {
                        stocks, history,
                        savedAt: Date.now(),
                        appVersion: APP_VERSION,
                        userName: user?.name || ''
                    });
                    if (!result.ok) {
                        setFsState({ status: 'error', fileName: handle.name, lastSync: null, error: result.message || '쓰기 실패' });
                        alert('파일 쓰기 실패: ' + (result.message || result.reason));
                        return;
                    }
                    await fsSaveHandle(user.id, handle);
                    setFileHandle(handle);
                    setFsState({
                        status: 'connected',
                        fileName: handle.name || 'portfolio.json',
                        lastSync: Date.now(),
                        error: ''
                    });
                    setToast({ show: true, msg: `📁 자동저장 연결: ${handle.name}` });
                    setTimeout(() => setToast(s => ({ ...s, show: false })), 3000);
                } catch (e) {
                    if (e.name !== 'AbortError') { // 사용자 취소가 아닌 경우만
                        alert('연결 실패: ' + e.message);
                    }
                }
            };

            // 권한 만료 시 재허가 (저장된 핸들 재사용)
            const reauthorizeAutoSaveFile = async () => {
                const handle = await fsLoadHandle(user.id);
                if (!handle) {
                    connectAutoSaveFile();
                    return;
                }
                const perm = await fsRequestPerm(handle, 'readwrite');
                if (perm === 'granted') {
                    setFileHandle(handle);
                    setFsState({
                        status: 'connected',
                        fileName: handle.name || 'portfolio.json',
                        lastSync: null,
                        error: ''
                    });
                    setToast({ show: true, msg: `✅ 자동저장 권한 재허가 완료: ${handle.name}` });
                    setTimeout(() => setToast(s => ({ ...s, show: false })), 2500);
                } else {
                    alert('권한이 부여되지 않았습니다. "다른 파일 선택"으로 다시 연결하세요.');
                }
            };

            // 자동저장 연결 해제
            const disconnectAutoSaveFile = async () => {
                if (!confirm('자동저장 파일 연결을 해제하시겠습니까?\n\n※ 파일 자체는 삭제되지 않으며, 이후엔 localStorage에만 저장됩니다.')) return;
                await fsRemoveHandle(user.id);
                setFileHandle(null);
                setFsState({ status: 'disconnected', fileName: '', lastSync: null, error: '' });
                setToast({ show: true, msg: '🔌 자동저장 연결 해제됨' });
                setTimeout(() => setToast(s => ({ ...s, show: false })), 2000);
            };

            // 자동저장 파일에서 데이터 불러오기 (다른 디바이스에서 동기화된 데이터 가져올 때)
            const loadFromAutoSaveFile = async () => {
                if (!fileHandle) {
                    alert('먼저 자동저장 파일을 연결하세요.');
                    return;
                }
                if (!confirm('자동저장 파일에서 데이터를 불러오시겠습니까?\n\n⚠️ 현재 화면의 데이터가 파일 내용으로 교체됩니다.\n(다른 디바이스에서 작업한 최신 데이터를 가져올 때 사용)')) return;
                try {
                    const file = await fileHandle.getFile();
                    const text = await file.text();
                    const data = JSON.parse(text);
                    if (!data.stocks) {
                        alert('파일 형식이 올바르지 않습니다.');
                        return;
                    }
                    const merged = { ...INITIAL_DATA };
                    Object.keys(data.stocks).forEach(k => {
                        if (merged[k] !== undefined) {
                            merged[k] = data.stocks[k].map(s => ({ ...s, transactions: s.transactions || [] }));
                        }
                    });
                    setStocks(merged);
                    setHistory(data.history || []);
                    setToast({ show: true, msg: `📥 파일에서 데이터 불러옴 (${new Date(data.savedAt || file.lastModified).toLocaleString('ko-KR')})` });
                    setTimeout(() => setToast(s => ({ ...s, show: false })), 4000);
                } catch (e) {
                    alert('불러오기 실패: ' + e.message);
                }
            };


            const addHistory = (item, from, to, type) => {
                const log = {
                    id: Date.now(),
                    name: item.name,
                    from: from ? ALL_GROUPS_META[from]?.t : '신규',
                    to: to ? ALL_GROUPS_META[to]?.t : '삭제됨',
                    date: new Date().toLocaleString(),
                    type: type 
                };
                setHistory(prev => [log, ...prev].slice(0, 50)); 
            };

            const checkConflict = (name, brokerage) => {
                for (const key of ALL_GROUPS_KEYS) {
                    const found = stocks[key].find(s => s.name === name && s.brokerage === brokerage);
                    if (found) return { found: true, item: found, group: key };
                }
                return { found: false };
            };

            // 전체 포트폴리오에서 중복 종목 탐색 (이름 + 증권사 기준)
            const findDuplicates = () => {
                const seen = {};
                ALL_GROUPS_KEYS.forEach(k => {
                    (stocks[k] || []).forEach(s => {
                        const key = `${s.name}__${s.brokerage || ''}`;
                        if (!seen[key]) seen[key] = [];
                        seen[key].push({ ...s, _group: k });
                    });
                });
                return Object.entries(seen)
                    .filter(([, items]) => items.length > 1)
                    .map(([key, items]) => ({ key, name: items[0].name, brokerage: items[0].brokerage, items }));
            };

            const duplicates = findDuplicates();

            const parseJSON = () => {
                try {
                    const json = JSON.parse(input.match(/\{[\s\S]*\}/)?.[0]);
                    
                    // Support both new 'groupCode' field and legacy 'recommendation' field
                    let rec = (json.groupCode || json.recommendation || '').toLowerCase();
                    if(rec === 'buystrong' || rec.includes('strong')) rec='buyStrong'; 
                    else if(rec === 'buyaccum2' || rec.includes('accum2')) rec='buyAccum2'; 
                    else if(rec === 'buyaccum' || rec.includes('accum')) rec='buyAccum'; 
                    else if(rec === 'sellprofit' || rec.includes('profit')) rec='sellProfit'; 
                    else if(rec === 'sellstop' || rec.includes('stop')) rec='sellStop'; 
                    else if(rec === 'hold' || rec.includes('hold')) rec='hold'; 
                    else rec='watchlist';

                    const newItem = { 
                        id: Date.now(), 
                        updatedAt: Date.now(),
                        ...json, 
                        currentPrice: parseFloat(String(json.currentPrice).replace(/,/g,'')) || 0, 
                        purchasePrice: parseFloat(String(json.purchasePrice).replace(/,/g,'')) || 0,
                        quantity: parseFloat(String(json.quantity).replace(/,/g,'')) || 0,
                        brokerage: json.brokerage || '',
                        probability: json.probability || '0',
                        analysis: json,
                        transactions: [] 
                    };
                    
                    const conflict = checkConflict(json.name, json.brokerage);
                    
                    setModal({
                        type: 'confirm_analysis',
                        data: newItem,
                        targetGroup: rec,
                        conflict: conflict
                    });
                    
                    setInput('');
                } catch(e) { alert("JSON 형식을 찾을 수 없습니다."); }
            };

            const addStock = (item, group, mode = 'replace') => {
                const next = {...stocks};
                let fromGroup = null;

                // Remove existing if present (Same Name + Same Brokerage)
                ALL_GROUPS_KEYS.forEach(k => {
                    const idx = next[k].findIndex(s => s.name === item.name && s.brokerage === item.brokerage);
                    if (idx !== -1) {
                        const existing = next[k][idx];
                        fromGroup = k;
                        
                        if (mode === 'merge') {
                            // Merge logic: Keep existing purchasePrice/quantity/transactions
                            item.purchasePrice = existing.purchasePrice;
                            item.quantity = existing.quantity;
                            item.transactions = existing.transactions || [];
                        } else if (mode === 'replace') {
                             // Replace logic: Keep transactions if new item has none
                            if (!item.transactions || item.transactions.length === 0) {
                                item.transactions = existing.transactions || [];
                            }
                        }
                        
                        next[k].splice(idx, 1);
                    }
                });
                
                const targetKey = next[group] ? group : 'watchlist';
                item.updatedAt = Date.now();
                next[targetKey] = [item, ...next[targetKey]];
                
                setStocks(next);
                addHistory(item, fromGroup, targetKey, fromGroup ? 'update' : 'add');
                setModal(null);
                
                const msg = fromGroup 
                    ? (mode === 'merge' ? `🔄 ${item.name} 정보 업데이트 완료 (보유량 유지)` : `📝 ${item.name} 정보 덮어쓰기 완료`)
                    : `✅ ${item.name} (${item.brokerage || '기본'}) 저장 완료`;
                
                setToast({ show: true, msg });
                setTimeout(() => setToast(s => ({ ...s, show: false })), 2000);
            };

            const copyPrompt = (name, country, price, purchasePrice, quantity, brokerage) => {
                const template = analysisMode === 'standard' ? stdPrompt : rebPrompt;
                const priceLabel = price
                    ? `(현재가: ${Number(String(price).replace(/,/g,'')).toLocaleString()}${country==='KR'?'원':'달러'})`
                    : '(현재가: 미입력)';
                let p = template
                    .replace('{name}', `${name} (${country})`)
                    .replace('{simpleName}', name.split('(')[0].trim())
                    .replace('{price}', priceLabel);

                if (analysisMode === 'rebalance') {
                    p = p.replace('{purchasePrice}', purchasePrice || '0')
                         .replace('{quantity}', quantity || '0')
                         .replace('{brokerage}', brokerage || '');
                }

                navigator.clipboard.writeText(p).then(() => {
                    alert("복사 완료!");
                }).catch(() => {
                    const t = document.createElement('textarea'); t.value = p; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
                    alert("복사 완료!");
                });
            };

            // 프롬프트 미리보기 생성 (prompt 모달용)
            const buildPreview = (name, country, price, purchasePrice, quantity, brokerage) => {
                const template = analysisMode === 'standard' ? stdPrompt : rebPrompt;
                const priceLabel = price
                    ? `(현재가: ${Number(String(price).replace(/,/g,'')).toLocaleString()}${country==='KR'?'원':'달러'})`
                    : '(현재가: 미입력)';
                let p = template
                    .replace('{name}', `${name} (${country})`)
                    .replace('{simpleName}', name.split('(')[0].trim())
                    .replace('{price}', priceLabel);
                if (analysisMode === 'rebalance') {
                    p = p.replace('{purchasePrice}', purchasePrice || '0')
                         .replace('{quantity}', quantity || '0')
                         .replace('{brokerage}', brokerage || '');
                }
                return p;
            };

            const searchTerm = (input && !input.includes('{')) ? input.trim() : '';

            const getFiltered = (list) => {
                if (!list) return [];
                const term = searchTerm.toLowerCase();
                const filtered = searchTerm
                    ? list.filter(s =>
                        s.name.toLowerCase().includes(term) ||
                        (s.brokerage && s.brokerage.toLowerCase().includes(term)) ||
                        ((s.ticker || s.analysis?.ticker || '').toLowerCase().includes(term))
                    )
                    : list;
                return [...filtered].sort((a, b) => {
                    if (sortMode === 'date') {
                        return (b.updatedAt || 0) - (a.updatedAt || 0);
                    }
                    if (a.country !== b.country) return a.country === 'KR' ? -1 : 1;
                    if (sortMode === 'prob') {
                        return (parseFloat(b.probability || b.analysis?.probability)||0) - (parseFloat(a.probability || a.analysis?.probability)||0);
                    }
                    return a.name.localeCompare(b.name, 'ko');
                });
            };

            // 전체 검색 결과 수
            const totalSearchMatches = searchTerm
                ? Object.values(stocks).flat().filter(s => {
                    const t = searchTerm.toLowerCase();
                    return s.name.toLowerCase().includes(t) ||
                        (s.brokerage && s.brokerage.toLowerCase().includes(t)) ||
                        ((s.ticker || s.analysis?.ticker || '').toLowerCase().includes(t));
                  }).length
                : 0;

            const exportCSV = (key, title) => {
                const list = stocks[key] || [];
                if (list.length === 0) return alert("데이터가 없습니다.");
                let csv = "\uFEFF종목명,Ticker,증권사,국가,현재가,매입가,수량,확률,매수존,목표가,손절가,전략,행동\n";
                list.forEach(s => {
                    const st = s.strategy || s.analysis?.strategy || '';
                    const act = s.action || s.analysis?.action || s.analysis?.reason || '';
                    const entry = s.entryPrice || s.analysis?.entryPrice || s.analysis?.buyZone || '';
                    const target = s.targetPrice || s.analysis?.targetPrice || s.analysis?.sellZone || '';
                    const stop = s.stopLoss || s.analysis?.stopLoss || '';
                    const prob = s.probability || s.analysis?.probability || '';
                    const tk = s.ticker || s.analysis?.ticker || '';
                    csv += `${s.name},${tk},${s.brokerage||''},${s.country},${s.currentPrice},${s.purchasePrice||0},${s.quantity||0},${prob}%,${entry},${target},${stop},"${st}","${act.replace(/"/g, '""')}"\n`;
                });
                const url = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
                const link = document.createElement("a"); link.href = url; link.download = `Nexus_${title}.csv`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const exportData = () => {
                const blob = new Blob([JSON.stringify({stocks, history})], {type:'application/json'});
                const now = new Date();
                const timestamp = now.toISOString().replace(/[:.]/g, '-').slice(0, 19);
                const a = document.createElement('a'); 
                a.href = URL.createObjectURL(blob); 
                a.download = `nexus_backup_${timestamp}.json`;
                a.click();
            };

            const importData = (e) => {
                const r = new FileReader();
                r.onload = ev => { 
                    try { 
                        const data = JSON.parse(ev.target.result);
                        const newStocks = data.stocks || data; 
                        const newHistory = data.history || [];

                        const mergedStocks = { ...INITIAL_DATA };
                        Object.keys(newStocks).forEach(k => { 
                            if(mergedStocks[k] !== undefined) {
                                mergedStocks[k] = newStocks[k].map(s => ({...s, transactions: s.transactions || []}));
                            }
                        });
                        
                        setStocks(mergedStocks);
                        setHistory(newHistory);
                        alert("데이터가 복원되었습니다."); 
                    } catch { alert("파일 형식이 올바르지 않습니다."); } 
                };
                if(e.target.files[0]) r.readAsText(e.target.files[0]);
            };

            const watchlistItems = getFiltered(stocks['watchlist'] || []);

            const editPrice = (group, id, price) => {
                const next = {...stocks};
                next[group] = next[group].map(s => s.id === id ? {...s, currentPrice: parseFloat(String(price).replace(/,/g,'')) || 0} : s);
                setStocks(next);
                setModal(null);
            };

            // ticker 업데이트 (전 그룹 검색해서 해당 id의 종목 갱신)
            const updateTicker = (id, newTicker) => {
                const cleaned = (newTicker || '').trim().toUpperCase().replace(/[^A-Z0-9.\-]/g, '');
                const next = {...stocks};
                ALL_GROUPS_KEYS.forEach(k => {
                    next[k] = (next[k] || []).map(s => s.id === id ? {...s, ticker: cleaned} : s);
                });
                setStocks(next);
            };

            const openAnalysisModal = () => {
                if(!input) return alert('종목명을 입력하세요');
                // Basic conflict check
                setModal({ type: 'prompt', name: input, price: '', country: 'KR', purchasePrice: '', quantity: '', brokerage: '키움' });
            };

            const moveStock = (id, from, to) => {
                if(from === to) return;
                const next = { ...stocks };
                const item = next[from].find(s => s.id === id);
                if(!item) return;
                next[from] = next[from].filter(s => s.id !== id);
                item.analysis.recommendation = to;
                next[to] = [item, ...next[to]];
                setStocks(next);
                addHistory(item, from, to, 'move');
            };

            // Transaction Handlers
            const addTransaction = (stock, type, date, price, qty, brokerage, memo) => {
                const newTx = {
                    id: Date.now(),
                    date, type,
                    price: parseFloat(price),
                    quantity: parseFloat(qty),
                    brokerage: brokerage || stock.brokerage || '',
                    memo: memo || ''
                };
                const updatedStock = {
                    ...stock,
                    transactions: [newTx, ...stock.transactions]
                };
                
                const next = {...stocks};
                const group = ALL_GROUPS_KEYS.find(k => next[k].some(s => s.id === stock.id));
                if(group) {
                    next[group] = next[group].map(s => s.id === stock.id ? updatedStock : s);
                    setStocks(next);
                    setModal(prev => ({...prev, s: updatedStock, txForm: { date: new Date().toISOString().slice(0,10), type: 'buy', price: '', qty: '', brokerage: stock.brokerage || '', memo: '' } }));
                }
            };

            const deleteTransaction = (stock, txId) => {
                const updatedStock = {
                    ...stock,
                    transactions: stock.transactions.filter(t => t.id !== txId)
                };
                const next = {...stocks};
                const group = ALL_GROUPS_KEYS.find(k => next[k].some(s => s.id === stock.id));
                if(group) {
                    next[group] = next[group].map(s => s.id === stock.id ? updatedStock : s);
                    setStocks(next);
                    setModal(prev => ({...prev, s: updatedStock}));
                }
            };

            const applyCalculatedInfo = (stock, avgPrice, totalQty) => {
                 const next = {...stocks};
                const group = ALL_GROUPS_KEYS.find(k => next[k].some(s => s.id === stock.id));
                if(group) {
                    const updatedStock = { ...stock, purchasePrice: avgPrice, quantity: totalQty };
                    next[group] = next[group].map(s => s.id === stock.id ? updatedStock : s);

                                                    아래 버튼을 눌러 재허가해주세요.
                                                </p>
                                                <div className="font-mono text-xs text-amber-900 bg-white px-2 py-1 rounded border border-amber-100 break-all">
                                                    {fsState.fileName}
                                                </div>
                                            </div>
                                        )}

                                        {fsState.status === 'error' && (
                                            <div className="bg-rose-50 border border-rose-200 rounded-xl p-4 mb-3">
                                                <div className="flex items-center gap-2 mb-2">
                                                    <span className="text-lg">❌</span>
                                                    <span className="text-xs font-bold text-rose-700 uppercase tracking-wide">오류 발생</span>
                                                </div>
                                                <p className="text-xs text-rose-800">{fsState.error || '파일에 쓸 수 없습니다.'}</p>
                                            </div>
                                        )}

                                        <div className="bg-slate-50 rounded-xl p-3 text-xs text-slate-600 mb-3 leading-relaxed">
                                            <div className="font-bold text-slate-700 mb-1.5">📌 작동 방식</div>
                                            <div>• 종목 추가/수정/삭제 시 <span className="font-bold text-violet-600">800ms 후 자동 저장</span></div>
                                            <div>• OneDrive/Dropbox 폴더에 저장하면 <span className="font-bold text-violet-600">클라우드 자동 동기화</span></div>
                                            <div>• localStorage 저장도 동시에 유지 (이중 안전장치)</div>
                                            {!FS_API_AVAILABLE && (
                                                <div className="mt-2 pt-2 border-t border-slate-200 text-rose-600 font-bold">
                                                    ⚠️ 이 브라우저는 자동저장 미지원. Chrome 86+ / Edge 86+ 필요
                                                </div>
                                            )}
                                        </div>

                                        <div className="grid grid-cols-1 gap-2">
                                            {fsState.status === 'permission_needed' && (
                                                <button
                                                    onClick={() => { setModal(null); reauthorizeAutoSaveFile(); }}
                                                    className="btn-primary bg-amber-500 hover:bg-amber-600"
                                                >
                                                    🔓 권한 재허가
                                                </button>
                                            )}

                                            {fsState.status === 'connected' && (
                                                <>
                                                    <button
                                                        onClick={async () => {
                                                            const result = await fsWriteFile(fileHandle, {
                                                                stocks, history,
                                                                savedAt: Date.now(),
                                                                appVersion: APP_VERSION,
                                                                userName: user?.name || ''
                                                            });
                                                            if (result.ok) {
                                                                setFsState(s => ({ ...s, lastSync: Date.now(), error: '' }));
                                                                setToast({ show: true, msg: '✅ 즉시 저장 완료' });
                                                                setTimeout(() => setToast(s => ({ ...s, show: false })), 2000);
                                                                setModal(null);
                                                            } else {
                                                                alert('저장 실패: ' + (result.message || result.reason));
                                                            }
                                                        }}
                                                        className="btn-primary bg-emerald-600 hover:bg-emerald-700"
                                                    >
                                                        💾 지금 즉시 저장
                                                    </button>
                                                    <button
                                                        onClick={() => { setModal(null); loadFromAutoSaveFile(); }}
                                                        className="w-full py-3 bg-blue-50 hover:bg-blue-100 text-blue-600 font-bold rounded-xl border border-blue-200 transition-colors text-sm"
                                                    >
                                                        📥 파일에서 데이터 불러오기 (다른 디바이스 동기화 시)
                                                    </button>
                                                </>
                                            )}

                                            <button
                                                onClick={() => { setModal(null); connectAutoSaveFile(); }}
                                                className="w-full py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors text-sm"
                                            >
                                                {fsState.status === 'disconnected' ? '📁 자동저장 파일 연결하기' : '🔄 다른 파일로 변경'}
                                            </button>

                                            {(fsState.status === 'connected' || fsState.status === 'permission_needed' || fsState.status === 'error') && (
                                                <button
                                                    onClick={() => { setModal(null); disconnectAutoSaveFile(); }}
                                                    className="w-full py-2.5 bg-white hover:bg-rose-50 text-rose-500 font-bold rounded-xl border border-rose-200 transition-colors text-xs"
                                                >
                                                    🔌 연결 해제
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                )}
                                {modal.type === 'price' && (
                                    <div>
                                        <h3 className="font-bold text-lg mb-4 text-center">현재가 수정</h3>
                                        <input type="number" id="price-edit" className="w-full input-light p-4 text-center text-xl mb-4 font-bold rounded-xl" defaultValue={modal.s.currentPrice} autoFocus/>
                                        <button onClick={()=>editPrice(modal.k, modal.s.id, document.getElementById('price-edit').value)} className="btn-primary">저장</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        
        // ... (Root component and render)
        const Root = () => {
            const [users, setUsers] = useState(() => JSON.parse(localStorage.getItem('nexus_users_v1') || '[]'));
            const [user, setUser] = useState(null);
            
            useEffect(() => localStorage.setItem('nexus_users_v1', JSON.stringify(users)), [users]);

            const handleReg = (n, p) => {
                if(!n || !p) return alert("정보를 입력해주세요.");
                const u = { id: 'u_'+Date.now(), name: n, pin: p };
                setUsers([...users, u]);
                setUser(u);
            };

            return (
                <div className="antialiased">
                    {user ? <Dashboard user={user} onLogout={()=>setUser(null)}/> : <Auth users={users} onLogin={setUser} onReg={handleReg}/>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
